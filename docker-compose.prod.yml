services:
  backend:
    build:
      context: ./fastapi-backend
    env_file:
      - ./fastapi-backend/.env.production
    restart: unless-stopped
    volumes:
      - backend-data:/data
    expose:
      - "8000"

  frontend:
    build:
      context: ./lumina-ai
    env_file:
      - ./lumina-ai/.env.production
    environment:
      BACKEND_API_BASE_URL: http://backend:8000
      NODE_ENV: production
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-ip.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  backend-data:
