services:
  - type: web
    name: lumina-ai-api
    runtime: python
    rootDir: fastapi-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.apimart.ai/v1
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_TEMPLATE_BUCKET
        value: lumina-templates
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Drmina AI <onboarding@resend.dev>
      - key: PASSWORD_RESET_BASE_URL
        value: https://lumina-ai-two-psi.vercel.app
      - key: PASSWORD_RESET_EXPIRE_MINUTES
        value: "30"
      - key: FREE_MONTHLY_QUOTA
        value: "5"
      - key: PRO_MONTHLY_QUOTA
        value: "500"
      - key: VIP1_IMAGE_QUOTA
        value: "50"
      - key: VIP2_IMAGE_QUOTA
        value: "100"
      - key: VIP3_IMAGE_QUOTA
        value: "500"
      - key: VIP1_PRICE
        value: "9.9"
      - key: VIP2_PRICE
        value: "19.9"
      - key: VIP3_PRICE
        value: "99.9"
      - key: PROMO_VIP2_BONUS_QUOTA
        value: "50"
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: PAYMENT_WEBHOOK_TIMESTAMP_TOLERANCE_SECONDS
        value: "300"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_USER_ID
        sync: false
