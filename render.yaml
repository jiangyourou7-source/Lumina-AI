services:
  - type: web
    name: lumina-ai-api
    runtime: python
    rootDir: fastapi-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.apimart.ai/v1
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_TEMPLATE_BUCKET
        value: lumina-templates
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Drmine AI <onboarding@resend.dev>
      - key: PASSWORD_RESET_BASE_URL
        value: https://lumina-ai-two-psi.vercel.app
      - key: PASSWORD_RESET_EXPIRE_MINUTES
        value: "30"
      - key: FREE_MONTHLY_QUOTA
        value: "10"
      - key: PRO_MONTHLY_QUOTA
        value: "500"
